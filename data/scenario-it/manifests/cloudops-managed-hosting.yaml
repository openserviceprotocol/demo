osp_version: "0.1"

service:
  identity:
    id: "cloudops.infrastructure.managed-hosting"
    name: "Enterprise Managed Hosting"
    version: "3.0.0"
    status: "active"
    maturity: "autonomous"
    summary: |
      Fully managed cloud infrastructure on AWS and Azure.
      Monitoring, patching, backups, and incident response
      around the clock. Infrastructure-as-code based.
      99.9% uptime guarantee.
    when_to_use: |
      For production-critical workloads requiring 24/7 operations,
      guaranteed uptime, and certified security. Ideal for companies
      without a dedicated ops team that need enterprise-grade
      infrastructure. AWS and Azure, Linux and Windows.
    when_not_to_use: |
      Not for dev/test environments where cost matters more than
      availability. No Google Cloud Platform. Not under
      CHF 2,000/month — smaller setups are better served by
      more affordable providers. No bare-metal or GPU hosting.
    tags: ["hosting", "cloud", "aws", "azure", "managed", "enterprise", "24x7"]
    domain: "it-services"
    engagement_type: "continuous"

  evaluation:
    capacity:
      cloud_providers: ["aws", "azure"]
      os_support: ["ubuntu", "debian", "rhel", "windows-server"]
      container_orchestration: ["kubernetes", "ecs"]
      managed_databases: ["postgresql", "mysql", "redis", "mongodb"]
      max_managed_instances: 500
      gpu_support: false

    geography:
      service_regions: ["CH", "DE", "AT"]
      infrastructure_regions: ["eu-central-1", "eu-west-1", "westeurope",
                               "northeurope", "us-east-1", "us-west-2"]

    performance:
      standard_leadtime: "24-48h for initial setup"
      uptime_sla: 0.999
      patch_cycle: "monthly, critical within 24h"
      backup_frequency: "daily, 30-day retention"
      mean_time_to_respond: "< 15 minutes"
      mean_time_to_resolve: "< 4 hours (P1 incidents)"
      sample_size: 340
      sample_period: "12 months"

    pricing:
      model: "subscription"
      currency: "CHF"
      indicative_range:
        min: 2000
        max: 25000
        note: "Monthly. Entry (5 VMs, business hours): CHF 2,000.
               Standard (20 VMs, 24/7): CHF 8,000. Enterprise
               (50+ VMs, 24/7, dedicated engineer): from CHF 15,000.
               Cloud infrastructure costs are additional."
      token_pricing_available: true

    certifications:
      - "ISO 27001"
      - "SOC 2 Type II"
      - "AWS Advanced Partner"
      - "Azure Expert MSP"

    sla:
      response_time: "< 15 minutes (24/7)"
      tracking_available: true
      incident_notification: "< 15 minutes"
      late_delivery_compensation: |
        99.9% uptime guarantee. Downtime beyond SLA: 10x service
        credits on the proportional monthly fee.

    confidence_note: |
      340 active hosting contracts. Mean time to respond
      consistently under 15 minutes (99.7% compliance).
      Enterprise pricing reflects 24/7 operations and
      certification costs.
